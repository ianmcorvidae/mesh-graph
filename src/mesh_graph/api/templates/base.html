<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}mesh-graph{% endblock %}</title>
<script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
<link rel="stylesheet" href="/static/style.css">
{% block head %}{% endblock %}
</head>
<body>
<nav>
  <a href="/" class="brand">mesh-graph</a>
  <a href="/network">Network</a>
  <a href="/nodes">Nodes</a>
  <a href="/traceroutes">Traceroutes</a>
</nav>
<main>
{% block content %}{% endblock %}
</main>
<script>
function formatTimestamps() {
  document.querySelectorAll('.ts-utc').forEach(function(el) {
    var iso = el.getAttribute('datetime');
    if (!iso) return;
    var d = new Date(iso);
    if (!isNaN(d)) el.textContent = d.toLocaleString(undefined, {
      year: 'numeric', month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
    });
  });
}
function formatLocal(iso) {
  var d = new Date(iso);
  return isNaN(d) ? iso : d.toLocaleString(undefined, {
    year: 'numeric', month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
  });
}
function utcToLocal(iso) {
  var d = new Date(iso.replace('Z','') + 'Z');
  var pad = function(n) { return String(n).padStart(2, '0'); };
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + 'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}
function localToUtc(str) {
  if (!str) return '';
  return new Date(str).toISOString().slice(0, 19) + 'Z';
}
document.addEventListener('DOMContentLoaded', formatTimestamps);
document.addEventListener('htmx:afterSwap', formatTimestamps);
</script>
</body>
</html>
